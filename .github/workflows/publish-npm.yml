name: Publish npm package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - run: npm ci
      - run: npm run build
      - run: npm run build:gateway
      - run: npm run test:security
      - run: npm run verify:generated
      - run: npm test
      - run: npm pack . --dry-run --json
      - run: npm pack ./packages/installer --dry-run --json
      - run: npm run release:preflight
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
      - id: policy
        shell: bash
        run: echo "dist_tag=$(node scripts/release-preflight.js --dist-tag | node -pe 'JSON.parse(fs.readFileSync(0)).distTag')" >> "$GITHUB_OUTPUT"
      - working-directory: packages/installer
        run: npm publish --provenance --access public --tag "${{ steps.policy.outputs.dist_tag }}"
