name: Publish npm package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      # npm's OIDC Trusted Publishing (the id-token:write permission above, used instead of a
      # static NPM_TOKEN secret) requires npm CLI >= 11.5.1. Node 22's bundled npm is older than
      # that, so without this the OIDC exchange silently never happens and the final publish step
      # falls back to an unauthenticated request -- which the registry answers with 404 rather
      # than a clear auth error, even though the package already exists. Pinned to the 11.x line
      # rather than `latest`: npm 12 changed `pack --json`'s output from a top-level array to an
      # object keyed by package name, which broke this same job's test:security step the first
      # time `latest` was tried here. scripts/release-policy.js's parsePackResult() now tolerates
      # both shapes regardless, but there's no reason to opt into that churn in CI on purpose.
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run build
      - run: npm run build:gateway
      - run: npm run test:security
      - run: npm run verify:generated
      - run: npm test
      - run: npm pack . --dry-run --json
      - run: npm pack ./packages/installer --dry-run --json
      - run: npm run release:preflight
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
      - id: policy
        shell: bash
        run: echo "dist_tag=$(node scripts/release-preflight.js --dist-tag | node -pe 'JSON.parse(fs.readFileSync(0)).distTag')" >> "$GITHUB_OUTPUT"
      - working-directory: packages/installer
        run: npm publish --provenance --access public --tag "${{ steps.policy.outputs.dist_tag }}"
